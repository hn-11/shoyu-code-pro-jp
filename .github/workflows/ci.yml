# Gate for every push/PR: build the Regular faces and run the shaping
# regression test. The full 14-face build happens in release.yml.
name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch upstream TTC (cached)
        uses: actions/cache@v4
        id: ttc
        with:
          path: upstream/SourceHanCodeJP.ttc
          key: shcj-2.012R
      - if: steps.ttc.outputs.cache-hit != 'true'
        run: |
          mkdir -p upstream
          curl -sSfL -o upstream/SourceHanCodeJP.ttc \
            https://github.com/adobe-fonts/source-han-code-jp/releases/download/2.012R/SourceHanCodeJP.ttc
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fontforge python3-fontforge
      - name: Fetch FontPatcher (cached)
        uses: actions/cache@v4
        id: fp
        with:
          path: FontPatcher
          key: fontpatcher-v3.4.0
      - if: steps.fp.outputs.cache-hit != 'true'
        run: |
          curl -sSfL -o /tmp/FontPatcher.zip \
            https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FontPatcher.zip
          unzip -qo /tmp/FontPatcher.zip -d FontPatcher
      - name: Fetch Monaspace (cached)
        uses: actions/cache@v4
        id: mona
        with:
          path: monaspace-vf
          key: monaspace-v1.400
      - if: steps.mona.outputs.cache-hit != 'true'
        run: |
          curl -sSfL -o /tmp/mona.zip \
            https://github.com/githubnext/monaspace/releases/download/v1.400/monaspace-variable-v1.400.zip
          mkdir -p monaspace-vf && unzip -qo /tmp/mona.zip -d monaspace-vf
      - run: echo "MONA_VF=$(find monaspace-vf -name 'Monaspace Neon Var.ttf' | head -1)" >> "$GITHUB_ENV"
      - run: python scripts/build.py "JP R"
      - run: python scripts/verify.py dist/ShoyuCodeProJP-Regular.otf
      - run: python scripts/verify.py dist/ShoyuCodeProJPConsole-Regular.otf
      - name: Nerd-patch smoke test (one font)
        run: python scripts/nerdpatch.py FontPatcher ShoyuCodeProJPConsole-Regular
