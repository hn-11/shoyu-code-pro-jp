# Tag push (v*) -> full 14-face build, verify, zip, GitHub release.
name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          mkdir -p upstream
          curl -sSfL -o upstream/SourceHanCodeJP.ttc \
            https://github.com/adobe-fonts/source-han-code-jp/releases/download/2.012R/SourceHanCodeJP.ttc
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fontforge python3-fontforge
      - run: |
          curl -sSfL -o /tmp/FontPatcher.zip \
            https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FontPatcher.zip
          unzip -qo /tmp/FontPatcher.zip -d FontPatcher
      - run: |
          curl -sSfL -o /tmp/mona.zip \
            https://github.com/githubnext/monaspace/releases/download/v1.400/monaspace-variable-v1.400.zip
          mkdir -p monaspace-vf && unzip -qo /tmp/mona.zip -d monaspace-vf
      - run: echo "MONA_VF=$(find monaspace-vf -name 'Monaspace Neon Var.ttf' | head -1)" >> "$GITHUB_ENV"
      - run: python scripts/build.py
      - run: python scripts/verify.py dist/ShoyuCodeProJP-Regular.otf
      - run: python scripts/verify.py dist/ShoyuCodeProJPConsole-Regular.otf
      - run: python scripts/nerdpatch.py FontPatcher
      - run: |
          cd dist && zip ShoyuCodeProJP.zip *.otf
          cd nerd && zip ../ShoyuCodeProJP-NerdFont.zip *.otf
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ShoyuCodeProJP.zip
            dist/ShoyuCodeProJP-NerdFont.zip
