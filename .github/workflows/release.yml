# Tag push (v*) -> full 14-face build, verify, zip, GitHub release.
name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          mkdir -p upstream
          curl -sSfL -o upstream/SourceHanCodeJP.ttc \
            https://github.com/adobe-fonts/source-han-code-jp/releases/download/2.012R/SourceHanCodeJP.ttc
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq fontforge python3-fontforge
      - run: |
          curl -sSfL -o /tmp/FontPatcher.zip \
            https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/FontPatcher.zip
          unzip -qo /tmp/FontPatcher.zip -d FontPatcher
      - run: python scripts/build.py
      - run: python scripts/verify.py dist/SauceHanCodeJP-Regular.otf
      - run: python scripts/verify.py dist/SauceHanCodeJPTerm-Regular.otf
      - run: python scripts/nerdpatch.py FontPatcher
      - run: |
          cd dist && zip SauceHanCodeJP.zip *.otf
          cd nerd && zip ../SauceHanCodeJP-NerdFont.zip *.otf
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SauceHanCodeJP.zip
            dist/SauceHanCodeJP-NerdFont.zip
