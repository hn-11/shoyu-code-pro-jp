# Tag push (v*) -> full 14-face build, verify, zip, GitHub release.
name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: |
          mkdir -p upstream
          curl -sSfL -o upstream/SourceHanCodeJP.ttc \
            https://github.com/adobe-fonts/source-han-code-jp/releases/download/2.012R/SourceHanCodeJP.ttc
      - run: python scripts/build.py
      - run: python scripts/verify.py
      - run: cd dist && zip SauceHanCodeJP.zip *.otf
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SauceHanCodeJP.zip
            dist/SauceHanCodeJP-Regular.otf
            dist/SauceHanCodeJP-Bold.otf
