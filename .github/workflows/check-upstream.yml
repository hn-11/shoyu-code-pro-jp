# Monthly: open an issue if adobe-fonts/source-han-code-jp ships a release
# newer than the pinned 2.012R (upstream has been dormant for years, but
# a new release would change the base we patch).
name: Check upstream release
on:
  schedule:
    - cron: "0 6 1 * *"
  workflow_dispatch:
permissions:
  issues: write
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Compare latest upstream tag with pin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh api repos/adobe-fonts/source-han-code-jp/releases/latest --jq .tag_name)
          echo "latest upstream: $latest (pinned: 2.012R)"
          if [ "$latest" != "2.012R" ]; then
            gh issue create -R "$GITHUB_REPOSITORY" \
              --title "Upstream release $latest available (pinned 2.012R)" \
              --body "adobe-fonts/source-han-code-jp released \`$latest\`. Update the pinned version in ci.yml / release.yml / README and rebuild." \
              || true
          fi
